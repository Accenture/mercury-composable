#
# Kafka CONSUMER configuration template for the SECONDARY cluster's flow adapter (twin-kafka).
#
# Same mechanics as minimalist-kafka's kafka-consumer.properties: override this file at
#   /tmp/config/secondary-kafka-consumer.properties   (typically rendered by CI/CD)
# or point secondary.kafka.consumer.properties (in application.properties) at another location.
# Values support ${ENV_VAR:default_value} environment-variable substitution.
#
# The library PINS in code (and will override anything set here): key=String / value=byte[] deserializers,
# enable.auto.commit=false, max.poll.records=1 - together these enforce the at-least-once,
# commit-after-process contract. The consumer group.id is NOT set here; it is configured per topic binding
# via 'group' in the file named by yaml.secondary.kafka.flow.adapter. The default port 8092 matches the
# kafka-standalone helper's SECOND broker (dual.servers=true). Everything below is yours.
#

# --- Connection ---
bootstrap.servers=${SECONDARY_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:8092}

# --- Where a brand-new consumer group starts reading ---
auto.offset.reset=${SECONDARY_KAFKA_AUTO_OFFSET_RESET:earliest}

# --- Enterprise security: uncomment and complete for your installation ---
# security.protocol=${SECONDARY_KAFKA_SECURITY_PROTOCOL:SASL_SSL}
# sasl.mechanism=${SECONDARY_KAFKA_SASL_MECHANISM:OAUTHBEARER}
# sasl.jaas.config=${SECONDARY_KAFKA_SASL_JAAS_CONFIG:}
# sasl.oauthbearer.token.endpoint.url=${SECONDARY_KAFKA_OAUTH_TOKEN_URL:}
# sasl.login.callback.handler.class=${SECONDARY_KAFKA_SASL_LOGIN_CALLBACK:}
# ssl.truststore.location=${SECONDARY_KAFKA_SSL_TRUSTSTORE_LOCATION:}
# ssl.truststore.password=${SECONDARY_KAFKA_SSL_TRUSTSTORE_PASSWORD:}
