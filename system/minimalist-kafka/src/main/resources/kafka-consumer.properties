#
# Kafka CONSUMER configuration template for the minimalist-kafka Kafka Flow Adapter.
#
# Enterprise Kafka installations vary widely - on-prem, cloud, SaaS, Confluent - and authenticate in
# different ways (SASL/PLAIN, SASL/SCRAM, OAuth2 with client-id/secret, mTLS). Rather than encode every
# variation in code, put your environment's settings here, or override this file at
#   /tmp/config/kafka-consumer.properties   (typically rendered by CI/CD)
# or point kafka.consumer.properties (in application.properties) at another location.
#
# Values support ${ENV_VAR:default_value} environment-variable substitution.
#
# The library PINS in code (and will override anything set here): key=String / value=byte[] deserializers,
# enable.auto.commit=false, max.poll.records=1 - together these enforce the at-least-once,
# commit-after-process contract. The consumer group.id is NOT set here; it is configured per topic binding
# via 'group' in kafka-flow-adapter.yaml (used exactly as given; defaults to kafka-flow-adapter.<topic>).
# Everything below is yours.
#

# --- Connection ---
bootstrap.servers=${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092}

# --- Where a brand-new consumer group starts reading ---
auto.offset.reset=${KAFKA_AUTO_OFFSET_RESET:earliest}

# --- Enterprise security: uncomment and complete for your installation ---
# security.protocol=${KAFKA_SECURITY_PROTOCOL:SASL_SSL}
# sasl.mechanism=${KAFKA_SASL_MECHANISM:OAUTHBEARER}
# sasl.jaas.config=${KAFKA_SASL_JAAS_CONFIG:}
# sasl.oauthbearer.token.endpoint.url=${KAFKA_OAUTH_TOKEN_URL:}
# sasl.login.callback.handler.class=${KAFKA_SASL_LOGIN_CALLBACK:}
# ssl.truststore.location=${KAFKA_SSL_TRUSTSTORE_LOCATION:}
# ssl.truststore.password=${KAFKA_SSL_TRUSTSTORE_PASSWORD:}
