#
# Backend flow (backend role) - Avro variant of 'system-of-record'. Reached when the Kafka flow adapter
# routes a message from 'avro-topic-1'. Because that binding sets schema.enabled, the adapter has already
# decoded the Confluent Avro value to a Map, which 'system.of.record.avro' receives.
#
#   1. system.of.record.avro     - the backend logic on the decoded Map; builds a FLAT reply matching the
#                                  closed-shape Avro SyncDemoMessage record (action, status, processedBy, traceId).
#   2. simple.kafka.notification - publish the reply to 'avro-topic-2' as Avro (schema-id=2 + type).
#
# schema-id 2 is the demo's pre-registered Avro SyncDemoMessage schema (see registry/2.json).
#
flow:
  id: 'system-of-record-avro'
  description: 'Process the Avro request and publish an Avro reply'
  ttl: 30s

first.task: 'system.of.record.avro'

tasks:
  - input:
      - 'input.body -> *'
      - 'input.header.cid -> header.cid'
      - 'input.header.traceparent -> header.traceparent'
    process: 'system.of.record.avro'
    output:
      - 'result -> model.payload'
      - 'header.cid -> model.cid'
    description: 'Process the decoded request'
    execution: sequential
    next:
      - 'simple.kafka.notification'

  - input:
      - 'text(avro-topic-2) -> header.topic'
      - 'text(AVRO) -> header.schema-type'
      - 'text(2) -> header.schema-id'
      - 'model.cid -> header.cid'
      - 'model.payload -> *'
    process: 'simple.kafka.notification'
    output: []
    description: 'Publish the reply to avro-topic-2 as Avro'
    execution: end
