#
# Kafka PRODUCER configuration for the sor role - identical to minimalist-kafka's bundled template
# except that the default bootstrap is the CLOUD broker (the kafka-standalone helper's second listener).
#
# Values support ${ENV_VAR:default_value} environment-variable substitution. Override by pointing
# kafka.producer.properties or secondary.kafka.producer.properties at another location. Normally that is
# one location; a comma-separated list is an optional fallback chain.
#

# --- Connection ---
bootstrap.servers=${CLOUD_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:8092}

# --- Durability ---
acks=all
