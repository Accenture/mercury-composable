#
# Test config for the twin-kafka dual-cluster end-to-end test (TwinKafkaBridgeTest). No REST - a pure
# event/flow bridge. Two @MainApplication entry points run: minimalist-kafka's KafkaFlowAutoStart
# (primary cluster A) and twin-kafka's SecondaryKafkaAutoStart (secondary cluster B). The test points
# the templates at the two embedded brokers via the KAFKA_BOOTSTRAP_SERVERS and
# SECONDARY_KAFKA_BOOTSTRAP_SERVERS system properties.
#
# Asymmetric Schema Registry (the real-world on-prem Apache + cloud Confluent topology):
# the PRIMARY registry URL stays blank (schema features off on cluster A) while the SECONDARY
# registry URL is injected by the test (embedded registry) - schema decode works on cluster B only.
#
application.name=twin-kafka-test
web.component.scan=org.platformlambda
cloud.connector=none
rest.automation=false
log.format=text
yaml.flow.automation=classpath:/flows.yaml
yaml.kafka.flow.adapter=classpath:/kafka-flow-adapter.yaml
yaml.secondary.kafka.flow.adapter=classpath:/secondary-kafka-flow-adapter.yaml
kafka.dlq.timeout.ms=20000
kafka.flow.max.retries=3
kafka.flow.retry.backoff.ms=500
# primary registry deliberately unset (blank when the env var is absent)
schema.registry.url=${SCHEMA_REGISTRY_URL:}
# secondary registry injected by the test
secondary.schema.registry.url=${SECONDARY_SCHEMA_REGISTRY_URL:}
secondary.schema.registry.cache.ttl=1h

# secondary header-name overrides: the secondary notification stamps these names on cluster B
# records, and the secondary adapter bindings read the same names back from cluster B.
secondary.kafka.correlation.id.header=X-Secondary-Cid
secondary.kafka.trace.id.header=X-Secondary-Trace
