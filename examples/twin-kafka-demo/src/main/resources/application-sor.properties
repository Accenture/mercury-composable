#
# sor role: the system-of-record on the cloud side. No REST.
#   java -Dspring.profiles.active=sor -jar target/twin-kafka-demo-x.y.z.jar
#
# Cloud-side app: consumes C_PROFILE_REQUEST, applies the command to the temp store
# /tmp/twin-kafka-demo, and publishes the outcome to C_PROFILE_RESPONSE on the cloud cluster.
# No schema.registry.url - the cloud cluster carries plain JSON bytes.
#
# In this worked example, the response publish uses secondary.kafka.notification to make the
# cloud Kafka boundary explicit and avoid accidentally writing to the on-prem cluster.
#
rest.automation=false

# the system-of-record flow
yaml.flow.automation=classpath:/flows-sor.yaml

# cloud Kafka client config: demo-local template variants whose default bootstrap is
# ${CLOUD_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:8092}
# KafkaFlowAutoStart always creates the primary minimalist-kafka publisher; keep even that unused
# publisher pointed at the cloud broker so the SOR role never opens an on-prem Kafka connection.
kafka.producer.properties=classpath:/sor-kafka-producer.properties
kafka.consumer.properties=classpath:/sor-kafka-consumer.properties

# cloud Kafka producer config for secondary.kafka.notification. Reuse the SOR producer template so
# both consume and publish point at the cloud broker.
secondary.kafka.producer.properties=classpath:/sor-kafka-producer.properties

# consume the cloud request topic into the profile-store flow
yaml.kafka.flow.adapter=classpath:/kafka-adapter-sor.yaml

# cloud cluster impedance-matching: consume and publish use the cloud correlation-id header.
kafka.correlation.id.header=X-Cloud-Correlation-Id
secondary.kafka.correlation.id.header=X-Cloud-Correlation-Id
