site_name: Composable for Java
site_description: >-
  Mercury Composable — Accenture's event-driven, composable application
  platform for Java: platform-core, Event Script, and the active
  knowledge graph.
site_url: https://accenture.github.io/mercury-composable/
docs_dir: docs

repo_name: Accenture/mercury-composable
repo_url: https://github.com/Accenture/mercury-composable
edit_uri: edit/main/docs/

copyright: >-
  Apache-2.0 &middot; mercury-composable also has an official
  <a href="https://github.com/Accenture/mercury">Rust implementation</a>.

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
    logo: material/atom
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
      check_paths: true
  # NOTE: pymdownx.emoji is deliberately NOT enabled. These docs are full of
  # colon-delimited technical patterns (e.g. HH:mm:ss), and the emoji extension
  # turns ":mm:" into a flag emoji in plain text.

plugins:
  - search:
      lang: en
      separator: '[\s\-\.]+'

# These files live in docs/ but aren't part of the nav on purpose
# (machine-readable artifacts linked from the AI docs).
not_in_nav: |
  llms.txt

validation:
  nav:
    omitted_files: info
  links:
    not_found: warn
    absolute_links: ignore

extra_css:
  - css/extra.css

nav:
  - Home: index.md

  - Orientation:
    - Getting Started: guides/getting-started.md

  - Foundations:
    - Architecture Overview: guides/architecture.md
    - Methodology: guides/methodology.md
    - AI Developer Guide: guides/ai-developer-guide.md

  - Layer 1 — Event-driven:
    - Overview: guides/event-driven/index.md
    - Write your first function: guides/event-driven/write-your-first-function.md
    - Function Execution Strategies: guides/event-driven/function-execution.md
    - Function AI agent guide: guides/event-driven/ai-agent-guide.md
    - REST Automation: guides/rest-automation/index.md
    - REST grammar: guides/rest-automation/rest-grammar.md
    - REST AI agent guide: guides/rest-automation/ai-agent-guide.md

  - Layer 2 — Composable:
    - Overview: guides/event-script/index.md
    - Event Script Syntax: guides/event-script/syntax.md
    - Flow grammar: guides/event-script/flow-grammar.md
    - Flow AI agent guide: guides/event-script/ai-agent-guide.md
    - Flow Configuration Schema: guides/flow-schema-reference.md

  - Layer 3 — Knowledge Graph:
    - Overview: guides/knowledge-graph/index.md
    - Build your first graph: guides/knowledge-graph/build-your-first-graph.md
    - Built-in skills reference: guides/knowledge-graph/skills-reference.md
    - MiniGraph command grammar: guides/knowledge-graph/command-reference.md
    - AI agent guide: guides/knowledge-graph/ai-agent-guide.md
    - Composing the layers: guides/knowledge-graph/composing-the-layers.md
    - Playground & AI companion: guides/knowledge-graph/playground-and-companion.md
    - Minimalist Property Graph: guides/knowledge-graph/property-graph.md

  - Operate & integrate:
    - Build, Test & Deploy: guides/build-test-deploy.md
    - Observability: guides/observability.md
    - Spring Boot Integration: guides/spring-boot.md
    - Event over HTTP: guides/event-over-http.md
    - Minimalist Kafka: guides/minimalist-kafka.md
    - Twin Kafka (dual cluster): guides/twin-kafka.md
    - Schema Registry Mock: guides/schema-registry-mock.md

    - Sync-over-Async: guides/sync-over-async.md
    - Minimalist Service Mesh: guides/service-mesh.md

  - Reference:
    - Architectural Decision Records: arch-decisions/ADR.md
    - API Overview: guides/api-overview.md
    - Annotations Reference: guides/annotations-reference.md
    - Configuration Reference: guides/configuration-reference.md
    - Event Envelope Reference: guides/event-envelope-reference.md
