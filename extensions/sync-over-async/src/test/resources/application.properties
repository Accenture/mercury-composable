#
# Test config for the sync-over-async end-to-end MVP (RestFlowMvpTest).
# REST automation routes POST /api/sync-to-async to the 'sync-to-async' flow; the Kafka flow adapter
# (autoloaded by KafkaFlowAutoStart) routes topic-1/topic-2 into the system-of-record/soa-reply flows.
#
application.name=sync-over-async-mvp
rest.server.port=8305
rest.automation=true
yaml.rest.automation=classpath:/rest.yaml
yaml.flow.automation=classpath:/flows.yaml
web.component.scan=org.platformlambda
# our Kafka usage is application-level (the building blocks), not the Mercury event mesh
cloud.connector=none
log.format=text
#
# Kafka building blocks. Client connection settings come from the kafka-producer.properties /
# kafka-consumer.properties templates (packaged in the minimalist-kafka jar); the test points them at the
# embedded broker via the KAFKA_BOOTSTRAP_SERVERS system property (their ${KAFKA_BOOTSTRAP_SERVERS:...}
# placeholder). Template locations are overridable below (file path falls back to classpath).
#
yaml.kafka.flow.adapter=classpath:/kafka-flow-adapter.yaml
# dead-letter confirm-write timeout; flow processing is bounded by each flow's own ttl
kafka.dlq.timeout.ms=20000
kafka.producer.properties=classpath:/kafka-producer.properties
kafka.consumer.properties=classpath:/kafka-consumer.properties
#
# Sync-over-async return-route engine (opt-in). Parameters are listed explicitly (even where they match
# the code defaults) to document the configurable surface for the reader. The test overrides redis.port
# with the embedded Redis via a system property (ConfigReader resolves a system property before the file).
#
sync.over.async.enabled=true
# Redis connection (discrete startup parameters)
redis.host=127.0.0.1
redis.port=6379
# Plain blank (no auth on the embedded Redis), not ${REDIS_PASSWORD:}: a build agent exporting
# that env var machine-wide would leak into this hermetic test and make Lettuce attempt AUTH.
# The production idiom (secret via ${REDIS_PASSWORD:}) is documented in RedisConfig's javadoc.
redis.password=
redis.ssl=false
redis.database=0
redis.timeout.ms=5000
# Return-route engine tunables
sync.return.channel.prefix=svc-return
sync.route.ttl.seconds=90
sync.response.ttl.seconds=30
sync.max.pending.requests=10000
