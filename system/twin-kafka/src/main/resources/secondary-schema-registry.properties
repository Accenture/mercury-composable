#
# Confluent SCHEMA REGISTRY client configuration template for the SECONDARY cluster (twin-kafka).
#
# The Schema Registry is OPTIONAL and per-cluster: it activates only when
# secondary.schema.registry.url is set in application.properties. A real-world bridge often pairs an
# on-prem Apache Kafka (no registry) with a cloud Confluent cluster (with one) - each side is
# configured independently.
#
# Everything in this file is passed VERBATIM to the secondary registry's REST client - authentication
# (OAuth 2.0 bearer, basic auth), SSL/TLS and optional parameters - exactly like minimalist-kafka's
# schema-registry.properties. Point secondary.schema.registry.properties at another location to
# externalize it. Normally that is one location; a comma-separated list is an optional fallback chain.
# Values support ${ENV_VAR:default} substitution, and OAuth token endpoint URLs found here are
# auto-registered on the JVM allow-list.
#

# --- OAuth 2.0 client-credentials (e.g. Azure AD / Entra ID): uncomment and complete ---
# bearer.auth.credentials.source=OAUTHBEARER
# bearer.auth.issuer.endpoint.url=${SECONDARY_SCHEMA_REGISTRY_OAUTH_TOKEN_URL:}
# bearer.auth.client.id=${SECONDARY_SCHEMA_REGISTRY_CLIENT_ID:}
# bearer.auth.client.secret=${SECONDARY_SCHEMA_REGISTRY_CLIENT_SECRET:}
# bearer.auth.scope=${SECONDARY_SCHEMA_REGISTRY_OAUTH_SCOPE:}

# --- Optional (Confluent Cloud): uncomment when your installation requires them ---
# bearer.auth.logical.cluster=${SECONDARY_SCHEMA_REGISTRY_LOGICAL_CLUSTER:}
# bearer.auth.identity.pool.id=${SECONDARY_SCHEMA_REGISTRY_IDENTITY_POOL_ID:}

# --- Basic authentication ---
# basic.auth.credentials.source=USER_INFO
# basic.auth.user.info=${SECONDARY_SCHEMA_REGISTRY_BASIC_AUTH:}

# --- SSL/TLS (when the registry or token endpoint needs a private truststore) ---
# schema.registry.ssl.truststore.location=${SECONDARY_SCHEMA_REGISTRY_SSL_TRUSTSTORE_LOCATION:}
# schema.registry.ssl.truststore.password=${SECONDARY_SCHEMA_REGISTRY_SSL_TRUSTSTORE_PASSWORD:}
