#
# Synchronous REST facade flow (facade role) - Protobuf variant of 'sync-to-async'.
#
# Identical to the byte[]/JSON/Avro flows except it publishes to 'protobuf-topic-1' as Confluent Protobuf:
#   1. sync.prepare              - register the return route and serialize the request payload.
#   2. simple.kafka.notification - publish to 'protobuf-topic-1' with schema-id=3 + schema-type=PROTOBUF, so
#                                  the body is serialized into the Confluent wire format (magic + id + index + payload).
#   3. sync.await                - block until the backend's reply arrives via 'protobuf-topic-2' + Redis.
#
# schema-id 3 is the demo's Protobuf SyncDemoMessage schema, pre-registered in the Schema Registry (see
# registry/3.json). The producer is id-driven: it never needs a subject or naming strategy.
#
flow:
  id: 'sync-to-async-protobuf'
  description: 'Synchronous REST facade over Kafka, using Confluent Protobuf on the wire'
  ttl: 30s
  exception: 'sync.error.handler'

first.task: 'sync.prepare'

tasks:
  - input:
      - 'input.body -> *'
    process: 'sync.prepare'
    output:
      - 'result -> model.payload'
      - 'header.cid -> model.cid'
    description: 'Register the return route and serialize the request payload'
    execution: sequential
    next:
      - 'simple.kafka.notification'

  - input:
      - 'text(protobuf-topic-1) -> header.topic'
      - 'text(PROTOBUF) -> header.schema-type'
      - 'text(3) -> header.schema-id'
      - 'model.cid -> header.cid'
      - 'model.payload -> *'
    process: 'simple.kafka.notification'
    output: []
    description: 'Publish the request to protobuf-topic-1 as Protobuf; a publish failure fails the flow'
    execution: sequential
    next:
      - 'sync.await'

  - input:
      - 'model.cid -> cid'
      - 'input.header.x-sync-timeout -> header.x-sync-timeout'
    process: 'sync.await'
    output:
      - 'result -> output.body'
    description: 'Await the async response via protobuf-topic-2 + Redis, then return it (HTTP 200)'
    execution: end

  - input:
      - 'error.code -> status'
      - 'error.message -> message'
    process: 'sync.error.handler'
    output:
      - 'result.status -> output.status'
      - 'result -> output.body'
    description: 'Map a publish failure or timeout to an HTTP status'
    execution: end
