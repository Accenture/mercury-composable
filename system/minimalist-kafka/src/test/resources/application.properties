#
# Test config for the minimalist-kafka end-to-end test (KafkaFlowAdapterTest). No REST - a pure
# event/flow processor. KafkaFlowAutoStart (@MainApplication) builds the publisher and starts the flow
# adapter (mini-test-topic -> kafka-sink-flow). Kafka client connection settings come from the
# kafka-producer.properties / kafka-consumer.properties templates; the test points those templates at the
# embedded broker by setting the KAFKA_BOOTSTRAP_SERVERS system property (resolved by their
# ${KAFKA_BOOTSTRAP_SERVERS:...} placeholder).
#
application.name=minimalist-kafka-test
web.component.scan=org.platformlambda
cloud.connector=none
rest.automation=false
log.format=text
yaml.flow.automation=classpath:/flows.yaml
yaml.kafka.flow.adapter=classpath:/kafka-flow-adapter.yaml
kafka.dlq.timeout.ms=20000
# Kafka client config templates (file path falls back to classpath). Listed explicitly to document the override.
kafka.producer.properties=file:/tmp/config/kafka-producer.properties,classpath:/kafka-producer.properties
kafka.consumer.properties=file:/tmp/config/kafka-consumer.properties,classpath:/kafka-consumer.properties
# Schema Registry: URL injected at runtime by the test (embedded registry on a random port); blank when
# unset so schema features stay off. Cache is a transient /tmp dir for the test.
schema.registry.url=${SCHEMA_REGISTRY_URL:}
schema.registry.cache.dir=/tmp/schema-registry-cache-test
schema.registry.cache.ttl=1h
# Flow-failure handling (explicit even where matching code defaults; DLQ is per-topic: <topic> + suffix).
kafka.flow.max.retries=3
kafka.flow.retry.backoff.ms=500
kafka.flow.dlq.suffix=.dlq
