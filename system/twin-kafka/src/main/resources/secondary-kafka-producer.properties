#
# Kafka PRODUCER configuration template for the SECONDARY cluster (twin-kafka).
#
# Same mechanics as minimalist-kafka's kafka-producer.properties: point
# secondary.kafka.producer.properties (in application.properties) at another location to externalize it.
# Normally that is one location; a comma-separated list is an optional fallback chain. Values support
# ${ENV_VAR:default_value} environment-variable substitution.
#
# The library PINS the serializers in code (key=String, value=byte[] - the wire contract). It also
# DEFAULTS partitioner.class to the library's SimpleRandomPartitioner (uniform random distribution -
# Kafka's sticky default skews low-volume traffic onto one partition); set partitioner.class here to
# override. Everything below is yours to configure. The default port 8092 matches the kafka-standalone helper's SECOND
# broker (start it with dual.servers=true for local dual-cluster development).
#

# --- Connection ---
bootstrap.servers=${SECONDARY_KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:8092}

# --- Durability (acks=all is safest; lower to 1/0 to trade durability for throughput) ---
acks=all

# --- Enterprise security: uncomment and complete for your installation ---
# security.protocol=${SECONDARY_KAFKA_SECURITY_PROTOCOL:SASL_SSL}
# sasl.mechanism=${SECONDARY_KAFKA_SASL_MECHANISM:OAUTHBEARER}
# OAuth2 (client-id / client-secret) is supplied through the JAAS config and a token endpoint:
# sasl.jaas.config=${SECONDARY_KAFKA_SASL_JAAS_CONFIG:}
# sasl.oauthbearer.token.endpoint.url=${SECONDARY_KAFKA_OAUTH_TOKEN_URL:}
# sasl.login.callback.handler.class=${SECONDARY_KAFKA_SASL_LOGIN_CALLBACK:}
# ssl.truststore.location=${SECONDARY_KAFKA_SSL_TRUSTSTORE_LOCATION:}
# ssl.truststore.password=${SECONDARY_KAFKA_SSL_TRUSTSTORE_PASSWORD:}
