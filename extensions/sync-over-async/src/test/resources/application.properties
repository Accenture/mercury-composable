#
# Test config for the sync-over-async end-to-end MVP (RestFlowMvpTest).
# REST automation routes POST /api/sync-to-async to the 'sync-to-async' flow; the Kafka flow adapter
# (autoloaded by KafkaFlowAutoStart) routes topic-1/topic-2 into the system-of-record/soa-reply flows.
#
application.name=sync-over-async-mvp
rest.server.port=8305
rest.automation=true
yaml.rest.automation=classpath:/rest.yaml
yaml.flow.automation=classpath:/flows.yaml
web.component.scan=org.platformlambda
# our Kafka usage is application-level (the building blocks), not the Mercury event mesh
cloud.connector=none
log.format=text
#
# Kafka building blocks. The test overrides kafka.bootstrap.servers with the embedded broker via a
# system property (ConfigReader resolves a system property by key name before the file value).
#
kafka.bootstrap.servers=127.0.0.1:9092
yaml.kafka.flow.adapter=classpath:/kafka-flow-adapter.yaml
kafka.flow.timeout.ms=20000
