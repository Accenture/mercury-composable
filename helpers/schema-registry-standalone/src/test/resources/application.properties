application.name=schema-registry-standalone-test

# scan path for the MainApplication and @PreLoad functions
web.component.scan=org.platformlambda.helpers.registry

# The built-in reactive HTTP server + REST automation (no rest-spring required).
# A dedicated test port keeps the suite off the dev default (8081).
rest.server.port=8383
rest.automation=true
yaml.rest.automation=classpath:/rest.yaml

# schema.registry.data.store defaults to the transient /tmp/schema-registry; the test wipes it before
# boot. Only a transient (/tmp) store is ever thrown away - a durable path is never touched.

cloud.connector=none

log.format=text
