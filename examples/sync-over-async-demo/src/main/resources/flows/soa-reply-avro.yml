#
# Reply-delivery flow (facade role) - Avro variant of 'soa-reply'. Reached when the Kafka flow adapter
# routes a message from 'avro-topic-2'. Because that binding sets schema.enabled, the adapter has already
# decoded the Confluent Avro reply to a Map, which 'soa.reply.avro' hands to the return-route coordinator
# (re-serialized to JSON) to complete the awaiting REST request.
#
flow:
  id: 'soa-reply-avro'
  description: 'Deliver the Avro async response back to the awaiting REST request'
  ttl: 30s

first.task: 'soa.reply.avro'

tasks:
  - input:
      - 'input.body -> *'
      - 'input.header.cid -> header.cid'
    process: 'soa.reply.avro'
    output:
      - 'result -> output.body'
    description: 'Bridge the decoded Kafka response to the return-route coordinator'
    execution: end
