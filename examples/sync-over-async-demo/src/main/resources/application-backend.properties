#
# Backend role: the system-of-record that processes requests off Kafka and publishes replies.
#   java -Dspring.profiles.active=backend -jar target/sync-over-async-demo-4.5.0.jar
# No REST and no Redis - it only consumes soa.request and publishes to soa.response.
#
rest.automation=false

# backend flow: system-of-record
yaml.flow.automation=classpath:/flows-backend.yaml
# bind the request topic to the system-of-record flow
yaml.kafka.flow.adapter=classpath:/kafka-adapter-backend.yaml

# the backend does not originate synchronous requests, so it needs no return-route coordinator
sync.over.async.enabled=false
