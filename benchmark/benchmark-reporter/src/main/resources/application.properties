application.name=benchmark-reporter
info.app.version=1.0.0
info.app.description=Self-contained end-to-end performance reporter (callback + RPC)

#
# Headless benchmark: no REST automation, no cloud connector — it only needs the in-JVM event bus.
#
rest.automation=false
cloud.connector=none

#
# AutoStart scans this package prefix for the @MainApplication entry point.
#
web.component.scan=com.accenture

#
# ElasticQueue store is read from here / system properties (default: file). The benchmark reports whichever
# store is active, so this file can be edited (or -Delastic.queue.store=bdb passed) to A/B the two stores.
#
#elastic.queue.store=file
#transient.data.store=/tmp/reactive
