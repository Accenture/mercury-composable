#
# Backend flow (backend role) - JSON Schema variant of 'system-of-record'. Reached when the Kafka flow
# adapter routes a message from 'json-topic-1'. Because that binding sets schema.enabled, the adapter has
# already decoded the Confluent-framed value to a Map, which 'system.of.record.json' receives.
#
#   1. system.of.record.json     - the backend logic (echo + metadata) on the decoded Map.
#   2. simple.kafka.notification - publish the reply to 'json-topic-2' as JSON Schema (schema-id + type).
#
# schema-id 1 is the demo's pre-registered SyncDemoMessage schema (see registry/1.json).
#
flow:
  id: 'system-of-record-json'
  description: 'Process the JSON-Schema request and publish a JSON-Schema reply'
  ttl: 30s

first.task: 'system.of.record.json'

tasks:
  - input:
      - 'input.body -> *'
      - 'input.header.cid -> header.cid'
      - 'input.header.traceparent -> header.traceparent'
    process: 'system.of.record.json'
    output:
      - 'result -> model.payload'
      - 'header.cid -> model.cid'
    description: 'Process the decoded request'
    execution: sequential
    next:
      - 'simple.kafka.notification'

  - input:
      - 'text(json-topic-2) -> header.topic'
      - 'text(JSON) -> header.schema-type'
      - 'text(1) -> header.schema-id'
      - 'model.cid -> header.cid'
      - 'model.payload -> *'
    process: 'simple.kafka.notification'
    output: []
    description: 'Publish the reply to json-topic-2 as JSON Schema'
    execution: end
