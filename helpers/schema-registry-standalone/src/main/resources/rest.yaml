rest:
  - service: "schema.registry.health"
    methods:
      - "GET"
    url: "/"

  - service: "schema.registry.register"
    methods:
      - "POST"
    url: "/subjects/{subject}/versions"
    
  - service: "schema.registry.get"
    methods:
      - "GET"
    url: "/schemas/ids/{id}"

  - service: "schema.registry.get.version"
    methods:
      - "GET"
    url: "/subjects/{subject}/versions/{version}"
