#
# Test config for the minimalist-kafka end-to-end test (KafkaFlowAdapterTest). No REST - a pure
# event/flow processor. KafkaFlowAutoStart (@MainApplication) builds the publisher and starts the flow
# adapter (mini-test-topic -> kafka-sink-flow). The test overrides kafka.bootstrap.servers with the
# embedded broker via a system property.
#
application.name=minimalist-kafka-test
web.component.scan=org.platformlambda
cloud.connector=none
rest.automation=false
log.format=text
yaml.flow.automation=classpath:/flows.yaml
kafka.bootstrap.servers=127.0.0.1:9092
yaml.kafka.flow.adapter=classpath:/kafka-flow-adapter.yaml
kafka.flow.timeout.ms=20000
