#
# Common configuration for the sync-over-async worked example.
#
# The same jar runs in one of two roles, selected by the active Spring profile:
#   facade  -> -Dspring.profiles.active=facade   (REST + sync-to-async + soa-reply + Redis coordinator)
#   backend -> -Dspring.profiles.active=backend  (system-of-record; no REST, no Redis)
# Profile-specific settings live in application-facade.properties / application-backend.properties.
#
application.name=sync-over-async-demo
web.component.scan=com.accenture
cloud.connector=none
log.format=text

# Kafka client connection comes from the templates bundled in minimalist-kafka; their default bootstrap is
# ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092} - i.e. the local kafka-standalone helper.
kafka.producer.properties=file:/tmp/config/kafka-producer.properties,classpath:/kafka-producer.properties
kafka.consumer.properties=file:/tmp/config/kafka-consumer.properties,classpath:/kafka-consumer.properties
# dead-letter confirm-write timeout; flow processing is bounded by each flow's own ttl
kafka.dlq.timeout.ms=10000

# Confluent Schema Registry (the local schema-registry-standalone helper) for the JSON-Schema demo path
# (json-topic-1 / json-topic-2). The byte[] path (soa.request / soa.response) does not use it.
schema.registry.url=${SCHEMA_REGISTRY_URL:http://127.0.0.1:8081}
# id->schema cache TTL. 30m lets schema changes be picked up while running (no pod restart); not-found is
# never cached, so a newly-registered schema is visible immediately. Lengthen it in production if desired.
schema.registry.cache.ttl=30m

# Redis return-route settings (used by the facade role; the local redis-standalone helper).
redis.host=127.0.0.1
redis.port=6379
redis.password=${REDIS_PASSWORD:}
redis.ssl=false
redis.database=0
redis.timeout.ms=5000
sync.return.channel.prefix=svc-return
sync.route.ttl.seconds=90
sync.response.ttl.seconds=30
sync.max.pending.requests=10000
