#
# minimalist-kafka worked example - a pure event/flow processor (no REST).
#
# KafkaFlowAutoStart (@MainApplication, in minimalist-kafka) builds the Kafka producer and starts the flow
# adapter from kafka-flow-adapter.yaml (demo.inbound -> kafka-demo-flow). Kafka connection settings come
# from the kafka-producer.properties / kafka-consumer.properties templates bundled in minimalist-kafka,
# whose default bootstrap is ${KAFKA_BOOTSTRAP_SERVERS:127.0.0.1:9092} - i.e. the local kafka-standalone.
# To point at another broker:  export KAFKA_BOOTSTRAP_SERVERS=host:port
#
application.name=kafka-demo
web.component.scan=com.accenture
cloud.connector=none
rest.automation=false
log.format=text

yaml.flow.automation=classpath:/flows.yaml
yaml.kafka.flow.adapter=classpath:/kafka-flow-adapter.yaml
kafka.flow.timeout.ms=30000

# Flow-failure handling. On repeated failure a message is dead-lettered to <topic> + suffix
# (demo.inbound -> demo.inbound.dlq); that DLQ topic must be pre-provisioned. The happy path never hits it.
kafka.flow.max.retries=3
kafka.flow.retry.backoff.ms=500
kafka.flow.dlq.suffix=.dlq
