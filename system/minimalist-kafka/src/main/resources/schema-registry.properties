#
# Confluent SCHEMA REGISTRY client configuration template for the minimalist-kafka building blocks.
#
# Everything in this file is passed VERBATIM to the Confluent Schema Registry REST client, so any
# current or future Confluent client parameter works here without a library change - authentication
# (OAuth 2.0 bearer, basic auth), SSL/TLS settings, proxy settings, and optional parameters such as
# bearer.auth.logical.cluster / bearer.auth.identity.pool.id (Confluent Cloud).
#
# Like the kafka-producer/consumer templates, override this file at
#   /tmp/config/schema-registry.properties   (typically rendered by CI/CD)
# or point schema.registry.properties (in application.properties) at another location.
# Values support ${ENV_VAR:default_value} environment-variable substitution.
#
# NOTE: the registry URL itself stays in application.properties (schema.registry.url) - it is the
# feature switch: unset means schema features are off. The library also pins its cache behavior
# (positive-results-only) in code; everything here is yours.
#
# OAuth 2.0 token endpoint URLs found here (bearer.auth.issuer.endpoint.url or
# sasl.oauthbearer.token.endpoint.url) are automatically added to the JVM allow-list system property
# org.apache.kafka.sasl.oauthbearer.allowed.urls - no manual System.setProperty needed.
#

# --- OAuth 2.0 client-credentials (e.g. Azure AD / Entra ID): uncomment and complete ---
# bearer.auth.credentials.source=OAUTHBEARER
# bearer.auth.issuer.endpoint.url=${SCHEMA_REGISTRY_OAUTH_TOKEN_URL:}
# bearer.auth.client.id=${SCHEMA_REGISTRY_CLIENT_ID:}
# bearer.auth.client.secret=${SCHEMA_REGISTRY_CLIENT_SECRET:}
# bearer.auth.scope=${SCHEMA_REGISTRY_OAUTH_SCOPE:}

# --- Optional (Confluent Cloud): uncomment when your installation requires them ---
# bearer.auth.logical.cluster=${SCHEMA_REGISTRY_LOGICAL_CLUSTER:}
# bearer.auth.identity.pool.id=${SCHEMA_REGISTRY_IDENTITY_POOL_ID:}

# --- Token cache tuning (seconds before expiry to refresh; Confluent default is 300) ---
# bearer.auth.cache.expiry.buffer.seconds=300

# --- Alternatives ---
# Reuse the Kafka transport's SASL OAuth settings (single credential for broker + registry):
# bearer.auth.credentials.source=SASL_OAUTHBEARER_INHERIT
# Fixed token (dev/test only):
# bearer.auth.credentials.source=STATIC_TOKEN
# bearer.auth.token=${SCHEMA_REGISTRY_STATIC_TOKEN:}
# Basic authentication:
# basic.auth.credentials.source=USER_INFO
# basic.auth.user.info=${SCHEMA_REGISTRY_BASIC_AUTH:}

# --- SSL/TLS (when the registry or token endpoint needs a private truststore) ---
# schema.registry.ssl.truststore.location=${SCHEMA_REGISTRY_SSL_TRUSTSTORE_LOCATION:}
# schema.registry.ssl.truststore.password=${SCHEMA_REGISTRY_SSL_TRUSTSTORE_PASSWORD:}
