application.name=schema-registry-standalone
info.app.version=1.0.0
info.app.description=Minimalist Confluent-compatible Schema Registry server for dev and integration

# scan path for the MainApplication and @PreLoad functions
web.component.scan=org.platformlambda.helpers.registry

# The built-in reactive HTTP server + REST automation (no rest-spring required).
# Confluent's local Schema Registry listens on 8081 by default; mirror it.
rest.server.port=8081
rest.automation=true
yaml.rest.automation=classpath:/rest.yaml

# Where schemas are persisted, as one <id>.json file per schema (loaded on boot + on demand, persisted across
# restarts). A convenient store you can back up / seed with known ids - or drop a new <id>.json into while the
# server runs (picked up on the next request). The default lives under /tmp (cleared by the OS on reboot);
# override to a durable dir (-Dschema.registry.data.store=$HOME/schema-registry) to survive reboots.
schema.registry.data.store=/tmp/schema-registry

# no cloud connector - this is a standalone dev server
cloud.connector=none

log.format=text
