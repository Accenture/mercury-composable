spring.application.name=kafka-connector
info.app.version=1.0.0
info.app.description=Kafka Connector Library
#
server.port=18083
#
# URL path for static content
#
spring.mvc.static-path-pattern=/**
#
# where to load the static files
#
spring.web.resources.static-locations=classpath:/public/
#
# scan these packages for Spring RestController endpoints, WebServlet and other Spring components
#
web.component.scan=com.accenture

#
# health admin endpoint dependencies
#
mandatory.health.dependencies=cloud.connector.health

#
# the unit tests run against an embedded kafka broker at 127.0.0.1:9092
# (see classpath:/kafka.properties); service.monitor=true skips the
# presence connector so the tests exercise the kafka client directly
#
cloud.connector=kafka
service.monitor=true
cloud.client.properties=classpath:/kafka.properties
#
# also enable the user-domain streaming pub/sub (PubSubSetup);
# it uses the same embedded broker via the default client properties
#
cloud.services=kafka.pubsub

#
# default group IDs
#
default.app.group.id=appGroup
#
# topics
#
monitor.topic=service.monitor
# closed.user.group number must be within max.closed.user.groups
closed.user.group=1
max.closed.user.groups=10

#
# use real (dynamically created) topics against the embedded broker
# so that the admin client code paths are exercised
#
application.feature.topic.substitution=false
