#
# Facade role: the synchronous REST front end.
#   java -Dspring.profiles.active=facade -jar target/sync-over-async-demo-4.5.0.jar
# Run more than one facade on a dev machine by overriding the port:
#   java -Dspring.profiles.active=facade -Drest.server.port=8401 -jar target/sync-over-async-demo-4.5.0.jar
#
rest.automation=true
rest.server.port=8400
yaml.rest.automation=classpath:/rest.yaml

# facade flows: the REST sync-to-async facade + the reply-delivery flow
yaml.flow.automation=classpath:/flows-facade.yaml
# bind the response topic to the reply flow (replies are delivered to the awaiting REST request)
yaml.kafka.flow.adapter=classpath:/kafka-adapter-facade.yaml

# enable the Redis return-route coordinator (the facade awaits cross-pod replies)
sync.over.async.enabled=true
