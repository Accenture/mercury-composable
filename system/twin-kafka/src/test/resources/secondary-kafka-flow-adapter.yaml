#
# SECONDARY cluster (B) bindings: the sink for messages bridged from A, the B-to-A bridge source,
# and a schema-enabled binding decoding against the SECONDARY registry (the primary has none -
# the asymmetric on-prem Apache + cloud Confluent topology).
#
consumer:
  - topic: 'bridge.mirror'
    flow: 'sink-b-flow'
    group: 'sink-b-group'
    correlation.id.header: 'X-Secondary-Cid'
    trace.id.header: 'X-Secondary-Trace'
  - topic: 'reverse.source'
    flow: 'bridge-b-to-a'
    group: 'bridge-b-group'
    correlation.id.header: 'X-Secondary-Cid'
    trace.id.header: 'X-Secondary-Trace'
  - topic: 'schema.mirror'
    flow: 'schema-sink-flow'
    group: 'schema-b-group'
    schema.enabled: true
    correlation.id.header: 'X-Secondary-Cid'
    trace.id.header: 'X-Secondary-Trace'
  # dead-letter regression: the poison flow always fails, so exhausted retries must land on the
  # SECONDARY cluster's DLQ topic (RetryPolicy carries the secondary publisher)
  - topic: 'poison.source'
    flow: 'poison-flow'
    group: 'poison-b-group'
    dlq-topic: 'poison.dlq'
    correlation.id.header: 'X-Secondary-Cid'
    trace.id.header: 'X-Secondary-Trace'
