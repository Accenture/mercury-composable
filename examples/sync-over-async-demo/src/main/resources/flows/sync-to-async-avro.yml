#
# Synchronous REST facade flow (facade role) - Avro variant of 'sync-to-async'.
#
# Identical to the byte[]/JSON flows except it publishes to 'avro-topic-1' as Confluent Avro:
#   1. sync.prepare              - register the return route and serialize the request payload.
#   2. simple.kafka.notification - publish to 'avro-topic-1' with subject=sync-demo-avro (version defaults to
#                                  latest); the producer resolves the schema id from the subject and serializes
#                                  the body into the Confluent wire format (magic byte + id + payload).
#   3. sync.await                - block until the backend's reply arrives via 'avro-topic-2' + Redis.
#
# subject 'sync-demo-avro' is the demo's Avro SyncDemoMessage schema, pre-registered in the Schema Registry
# (see registry/2.json, which carries subject + version). The producer resolves the schema id internally.
#
flow:
  id: 'sync-to-async-avro'
  description: 'Synchronous REST facade over Kafka, using Confluent Avro on the wire'
  ttl: 30s
  exception: 'sync.error.handler'

first.task: 'sync.prepare'

tasks:
  - input:
      - 'input.body -> *'
    process: 'sync.prepare'
    output:
      - 'result -> model.payload'
      - 'header.cid -> model.cid'
    description: 'Register the return route and serialize the request payload'
    execution: sequential
    next:
      - 'simple.kafka.notification'

  - input:
      - 'text(avro-topic-1) -> header.topic'
      - 'text(sync-demo-avro) -> header.subject'
      - 'model.cid -> header.cid'
      - 'model.payload -> *'
    process: 'simple.kafka.notification'
    output: []
    description: 'Publish the request to avro-topic-1 as Avro; a publish failure fails the flow'
    execution: sequential
    next:
      - 'sync.await'

  - input:
      - 'model.cid -> cid'
      - 'input.header.x-sync-timeout -> header.x-sync-timeout'
    process: 'sync.await'
    output:
      - 'result -> output.body'
    description: 'Await the async response via avro-topic-2 + Redis, then return it (HTTP 200)'
    execution: end

  - input:
      - 'error.code -> status'
      - 'error.message -> message'
    process: 'sync.error.handler'
    output:
      - 'result.status -> output.status'
      - 'result -> output.body'
    description: 'Map a publish failure or timeout to an HTTP status'
    execution: end
